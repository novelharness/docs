version: "3.9"
services:
  runtime:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "pip install -r runtime/requirements.txt &&
      uvicorn runtime.src.main:app --host 0.0.0.0 --port 8100"
    ports:
      - "8100:8100"

  mcp:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "pip install -r mcp/requirements.txt &&
      uvicorn mcp.src.main:app --host 0.0.0.0 --port 8200"
    ports:
      - "8200:8200"

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/data/import

volumes:
  n8n_data:
